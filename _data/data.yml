        details: |
          - Designed and implemented RESTful endpoints, ensuring reliability, security, rapid response times, scalability, and maintainability.
          - Optimized media streaming websites to enhance user experience and engagement, including notable platforms for streaming and podcast hosting.
          - Acted as an occasional team lead, liaising with stakeholders to assess new requirements and develop strategies for innovative features.
          - Conducted research, analysis, and improvement of data reports.
          - Led the optimization and migration of legacy systems, identifying and implementing critical business flow improvements.

      - role: Business Manager
        time: 2011 - 2013
        company: MaskoInc Veterinary (Family Business)
        details: |
          - Managed supplies and sales operations, ensuring smooth business functionality.
          - Fostered a healthy work environment and developed strong team relationships.
          - Oversaw accounting operations and performed detailed report analysis to guide business decisions.
          - Led innovation initiatives, consistently seeking and capitalizing on new business opportunities.

      - role: Software Developer
        time: 2010 - 2011
        company: Distribuciones Horizontales S.A.
        details: |
          - Translated business requirements into technical solutions, delivering effective software tools.
          - Developed and integrated new accounting tools with existing ERP systems, emphasizing data integrity.
          - Analyzed business processes to identify automation opportunities, reducing redundancy and optimizing resource utilization.

